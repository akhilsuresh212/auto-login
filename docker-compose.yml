services:
  auto-login:
    build: .
    image: auto-login-app
    container_name: greythr-auto-login
    restart: unless-stopped
    env_file:
      - .env
      - .env.keys
    environment:
      - HEADLESS=true
      - DOTENV_PRIVATE_KEY=${DOTENV_PRIVATE_KEY}
      - TZ=Asia/Kolkata
    # Shared memory size might need increasing for browser
    shm_size: '2gb'
    # IPC host avoids Chrome crashes in Docker
    ipc: host
    # Healthcheck to ensure the container is running properly
    healthcheck:
      test: ["CMD", "node", "dist/index.js", "--health"]
      interval: 45m
      timeout: 10s
      retries: 3
      
